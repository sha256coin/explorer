name: Deploy S256 Explorer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@7.0.1
        with:
          # Removed --delete to protect local-only files on the VPS
          switches: -avzr
          path: ./
          remote_path: /home/janos/explorer
          remote_host: ${{ secrets.VPS_IP }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: ${{ secrets.VPS_PORT }}
          # List of files/folders to never overwrite or touch on the VPS
          exclude: |
            .git/
            .github/
            node_modules/
            .env
            logs/
            *.mapbackup
            COIN_SUPPLY.txt
            *.txt
            *.md

      - name: Restart PM2 Processes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /home/janos/explorer
            # Install any new dependencies added to package.json
            npm install --production
            # Zero-downtime reload for the Explorer API and Sync processes
            pm2 startOrReload ecosystem.config.js --update-env
